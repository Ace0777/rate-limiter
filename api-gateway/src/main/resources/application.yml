spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ratelimiter
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 100ms

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      redis-rate-limiter:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

rate-limiter:
  fallback-policy: FAIL_CLOSED #Troco de acordo com a regra de negocio/aplicação